name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # 你的主分支名，如果是 master 就改成 master
  workflow_dispatch: # 允许手动触发部署

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          # 如果是个人站点，使用 custom_domain 配置你的域名
          # custom_domain: yourdomain.com
