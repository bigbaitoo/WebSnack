<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebSnack - 有趣的碎片化应用集合</title>
  <link rel="stylesheet" href="/shared/styles/global.css">
</head>
<body>
  <div id="app">
    <header class="header">
      <h1>🍿 WebSnack</h1>
      <p>有趣的碎片化应用集合，随时打开随时玩</p>
    </header>

    <main class="main">
      <section class="category">
        <h2>🎮 小游戏</h2>
        <div class="app-grid">
          <a href="apps/games/index.html" class="app-card">
            <div class="app-icon">🎯</div>
            <div class="app-info">
              <h3>游戏专区</h3>
              <p>所有小游戏合集，随时打开随时玩</p>
            </div>
          </a>
          <a href="apps/demo/index.html" class="app-card">
            <div class="app-icon">🎯</div>
            <div class="app-info">
              <h3>示例应用</h3>
              <p>演示应用，展示基础功能</p>
            </div>
          </a>
          <a href="apps/game-2048/index.html" class="app-card">
            <div class="app-icon">🎲</div>
            <div class="app-info">
              <h3>2048 小游戏</h3>
              <p>经典的数字合并益智游戏</p>
            </div>
          </a>
          <!-- 新增游戏应用添加到这里 -->
        </div>
      </section>

      <section class="category">
        <h2>🛠️ 工具集</h2>
        <div class="app-grid">
          <a href="apps/tool-uploader/index.html" class="app-card">
            <div class="app-icon">📤</div>
            <div class="app-info">
              <h3>应用上传工具</h3>
              <p>上传 HTML 应用，自动部署到站点</p>
            </div>
          </a>
          <a href="apps/app-gallery/index.html" class="app-card">
            <div class="app-icon">🏪</div>
            <div class="app-info">
              <h3>应用广场</h3>
              <p>浏览和搜索所有已上传的应用</p>
            </div>
          </a>
          <!-- 工具应用添加到这里 -->
        </div>
      </section>

      <section class="category">
        <h2>📱 实用应用</h2>
        <div class="app-grid">
          <!-- 实用应用添加到这里 -->
        </div>
      </section>

      <section class="category">
        <h2>🌍 语言专区</h2>
        <div class="app-grid">
          <a href="apps/ru/index.html" class="app-card">
            <div class="app-icon">🇷🇺</div>
            <div class="app-info">
              <h3>俄语专区</h3>
              <p>Русская секция - 俄语应用和游戏集合</p>
            </div>
          </a>
          <!-- 其他语言专区添加到这里 -->
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>© 2024 WebSnack. Built with ❤️ for fun.</p>
    </footer>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
