<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>应用上传工具 - WebSnack</title>
  <link rel="stylesheet" href="../../shared/styles/global.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-container">
    <div class="app-header">
      <a href="../../index.html" class="back-link">← 返回首页</a>
      <h1>📤 应用上传工具</h1>
    </div>

    <div class="upload-container">
      <div class="upload-form">
        <div class="form-section">
          <h2>应用信息</h2>

          <div class="form-group">
            <label for="appType">应用分类 *</label>
            <select id="appType" required>
              <option value="">请选择分类</option>
              <option value="game">🎮 游戏类</option>
              <option value="tool">🛠️ 工具类</option>
              <option value="app">📱 应用类</option>
              <option value="ru">🇷🇺 俄语专区</option>
            </select>
          </div>

          <div class="form-group">
            <label for="appName">应用名称 *</label>
            <input type="text" id="appName" placeholder="例如：2048 小游戏" required>
          </div>

          <div class="form-group">
            <label for="appDescription">应用描述 *</label>
            <textarea id="appDescription" rows="3" placeholder="简单描述应用的功能和特点" required></textarea>
          </div>

          <div class="form-group">
            <label for="appIcon">应用图标 *</label>
            <select id="appIcon" required>
              <option value="🎮">🎮 游戏</option>
              <option value="🛠️">🛠️ 工具</option>
              <option value="📱">📱 应用</option>
              <option value="🎯">🎯 目标</option>
              <option value="🎲">🎲 骰子</option>
              <option value="🧩">🧩 拼图</option>
              <option value="🎨">🎨 创意</option>
              <option value="⚡">⚡ 效率</option>
              <option value="📊">📊 数据</option>
              <option value="🔧">🔧 工具</option>
              <option value="🇷🇺">🇷🇺 俄语</option>
            </select>
          </div>
        </div>

        <div class="form-section">
          <h2>文件上传</h2>

          <div class="form-group">
            <label for="htmlFile">index.html 文件 *</label>
            <div class="file-upload">
              <input type="file" id="htmlFile" accept=".html" required>
              <div class="file-preview" id="htmlPreview">
                <span class="file-icon">📄</span>
                <span class="file-name">未选择文件</span>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="cssFile">样式文件（可选）</label>
            <div class="file-upload">
              <input type="file" id="cssFile" accept=".css">
              <div class="file-preview" id="cssPreview">
                <span class="file-icon">🎨</span>
                <span class="file-name">未选择文件</span>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="jsFile">脚本文件（可选）</label>
            <div class="file-upload">
              <input type="file" id="jsFile" accept=".js">
              <div class="file-preview" id="jsPreview">
                <span class="file-icon">⚙️</span>
                <span class="file-name">未选择文件</span>
              </div>
            </div>
          </div>

          <div class="form-group">
            <label for="assetFiles">其他资源文件（可选，图片、字体等）</label>
            <div class="file-upload">
              <input type="file" id="assetFiles" multiple accept="image/*,.ttf,.otf,.woff,.woff2,.svg">
              <div class="file-preview" id="assetsPreview">
                <span class="file-icon">📦</span>
                <span class="file-name">未选择文件</span>
              </div>
            </div>
            <small class="form-hint">支持图片、字体等资源文件，会保存到应用的 assets 目录下</small>
          </div>
        </div>

        <div class="form-actions">
          <button type="button" id="previewBtn" class="btn btn-secondary">预览效果</button>
          <button type="button" id="submitBtn" class="btn btn-primary">保存到本地</button>
          <button type="button" id="exportBtn" class="btn btn-secondary">导出应用包</button>
        </div>

        <div class="status-message" id="statusMessage" style="display: none;"></div>
      </div>

      <div class="preview-section" id="previewSection" style="display: none;">
        <h2>预览效果</h2>
        <div class="preview-container">
          <iframe id="previewFrame" sandbox="allow-scripts"></iframe>
        </div>
      </div>
    </div>

    <div class="progress-overlay" id="progressOverlay" style="display: none;">
      <div class="progress-content">
        <div class="progress-spinner"></div>
        <h3>正在上传部署...</h3>
        <p id="progressText">正在准备文件...</p>
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>
    </div>

    <div class="success-modal" id="successModal" style="display: none;">
      <div class="modal-content">
        <div class="success-icon">🎉</div>
        <h2>保存成功！</h2>
        <p>应用已经保存到本地</p>
        <div class="success-links">
          <a href="" id="appLink" target="_blank" class="btn btn-primary">立即打开</a>
          <button id="closeModalBtn" class="btn btn-secondary">关闭</button>
        </div>
        <small>应用保存在浏览器本地，清除浏览器数据会丢失</small>
      </div>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
