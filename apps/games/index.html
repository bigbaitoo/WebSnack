<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>游戏专区 - WebSnack</title>
  <link rel="stylesheet" href="../../shared/styles/global.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-container">
    <div class="app-header">
      <a href="../../index.html" class="back-link">← 返回首页</a>
      <h1>🎮 游戏专区</h1>
      <p>收集各种有趣的休闲小游戏，随时打开随时玩</p>
    </div>

    <main class="games-main">
      <div class="games-grid">
        <a href="../game-2048/index.html" class="game-card">
          <div class="game-icon">🎲</div>
          <div class="game-info">
            <h3>2048 小游戏</h3>
            <p>经典的数字合并益智游戏</p>
            <div class="game-tags">
              <span class="tag">益智</span>
              <span class="tag">休闲</span>
            </div>
          </div>
        </a>

        <!-- 新增游戏添加到这里 -->
        <div class="game-card empty-card">
          <div class="empty-icon">🎮</div>
          <p>更多游戏开发中...</p>
        </div>
      </div>

      <div class="upload-section">
        <h3>🎁 分享你的游戏</h3>
        <p>如果你有好玩的 HTML5 小游戏，欢迎上传分享！</p>
        <a href="../tool-uploader/index.html" class="btn btn-primary">上传游戏</a>
      </div>
    </main>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
