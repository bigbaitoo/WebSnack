<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>应用广场 - WebSnack</title>
  <link rel="stylesheet" href="../../shared/styles/global.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-container">
    <div class="app-header">
      <a href="../../index.html" class="back-link">← 返回首页</a>
      <h1>🏪 应用广场</h1>
      <p>所有已上传的应用都在这里</p>
    </div>

    <div class="search-section">
      <input type="text" id="searchInput" placeholder="搜索应用名称或描述..." class="search-input">
      <div class="filter-buttons">
        <button class="filter-btn active" data-type="all">全部</button>
        <button class="filter-btn" data-type="game">🎮 游戏</button>
        <button class="filter-btn" data-type="tool">🛠️ 工具</button>
        <button class="filter-btn" data-type="app">📱 应用</button>
        <button class="filter-btn" data-type="ru">🇷🇺 俄语专区</button>
      </div>
    </div>

    <div class="apps-grid" id="appsGrid">
    </div>

    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-icon">📭</div>
      <h3>暂无应用</h3>
      <p>还没有上传任何应用，快去上传第一个吧！</p>
      <a href="../tool-uploader/index.html" class="btn btn-primary">上传应用</a>
    </div>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
