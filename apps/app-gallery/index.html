<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>应用广场 - WebSnack</title>
  <link rel="stylesheet" href="../../shared/styles/global.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="app-container">
    <div class="app-header">
      <a href="../../index.html" class="back-link">← 返回首页</a>
      <h1>🏪 应用广场</h1>
      <p>所有已上传的应用都在这里</p>
    </div>

    <div class="search-section">
      <input type="text" id="searchInput" placeholder="搜索应用名称或描述..." class="search-input">
      <div class="filter-buttons">
        <button class="filter-btn active" data-type="all">全部</button>
        <button class="filter-btn" data-type="game">🎮 游戏</button>
        <button class="filter-btn" data-type="tool">🛠️ 工具</button>
        <button class="filter-btn" data-type="app">📱 应用</button>
        <button class="filter-btn" data-type="ru">🇷🇺 俄语专区</button>
      </div>
    </div>

    <div class="apps-grid" id="appsGrid">
      <!-- 应用列表直接写死在HTML中，确保一定会显示 -->
      <div class="app-card">
        <div class="app-header-card">
          <div class="app-icon">🎯</div>
          <div class="app-info">
            <h3>示例应用</h3>
            <span class="app-type">应用</span>
          </div>
        </div>
        <p class="app-description">演示应用，展示基础功能</p>
        <div class="app-actions">
          <a href="/apps/demo/index.html" class="app-btn app-btn-primary">打开应用</a>
        </div>
      </div>

      <div class="app-card">
        <div class="app-header-card">
          <div class="app-icon">🎲</div>
          <div class="app-info">
            <h3>2048 小游戏</h3>
            <span class="app-type">游戏</span>
          </div>
        </div>
        <p class="app-description">经典的数字合并益智游戏</p>
        <div class="app-actions">
          <a href="/apps/game-2048/index.html" class="app-btn app-btn-primary">打开应用</a>
        </div>
      </div>

      <div class="app-card">
        <div class="app-header-card">
          <div class="app-icon">📤</div>
          <div class="app-info">
            <h3>应用上传工具</h3>
            <span class="app-type">工具</span>
          </div>
        </div>
        <p class="app-description">上传 HTML 应用，自动部署到站点</p>
        <div class="app-actions">
          <a href="/apps/tool-uploader/index.html" class="app-btn app-btn-primary">打开应用</a>
        </div>
      </div>
    </div>

    <div class="empty-state" id="emptyState" style="display: none;">
      <div class="empty-icon">📭</div>
      <h3>暂无应用</h3>
      <p>还没有上传任何应用，快去上传第一个吧！</p>
      <a href="../tool-uploader/index.html" class="btn btn-primary">上传应用</a>
    </div>
  </div>

  <script>
    // 简单的搜索和筛选功能
    document.addEventListener('DOMContentLoaded', function() {
      const searchInput = document.getElementById('searchInput')
      const filterButtons = document.querySelectorAll('.filter-btn')
      const appCards = document.querySelectorAll('.app-card')

      // 搜索功能
      searchInput.addEventListener('input', function() {
        const keyword = this.value.toLowerCase()
        appCards.forEach(card => {
          const name = card.querySelector('h3').textContent.toLowerCase()
          const description = card.querySelector('.app-description').textContent.toLowerCase()
          if (name.includes(keyword) || description.includes(keyword)) {
            card.style.display = 'flex'
          } else {
            card.style.display = 'none'
          }
        })
      })

      // 筛选功能
      filterButtons.forEach(btn => {
        btn.addEventListener('click', function() {
          filterButtons.forEach(b => b.classList.remove('active'))
          this.classList.add('active')
          const type = this.dataset.type

          appCards.forEach(card => {
            const appType = card.querySelector('.app-type').textContent.toLowerCase()
            if (type === 'all' || appType === type) {
              card.style.display = 'flex'
            } else {
              card.style.display = 'none'
            }
          })
        })
      })
    })
  </script>
</body>
</html>
