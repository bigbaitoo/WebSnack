                this.sounds.grenade = this.generateSound('sine', 300, 0.2, 0.12, 300);

                // 拾取道具音效：正弦波，660Hz，0.15秒，快速颤音
                const pickupBuffer = this.audioContext.createBuffer(1, this.audioContext.sampleRate * 0.15, this.audioContext.sampleRate);
                const pickupData = pickupBuffer.getChannelData(0);
                for (let i = 0; i < pickupData.length; i++) {
                    const time = i / this.audioContext.sampleRate;
                    const vibrato = 50 * Math.sin(2 * Math.PI * 10 * time);
                    const sample = Math.sin(2 * Math.PI * (660 + vibrato) * time);
                    const envelope = 1 - time / 0.15;
                    pickupData[i] = sample * 0.15 * envelope;
                }
                this.sounds.pickup = pickupBuffer;
            }

            // 最高分相关方法
            loadHighScore() {
                try {
                    const savedScore = localStorage.getItem('redFortressHighScore');
                    if (savedScore !== null) {
                        this.highScore = parseInt(savedScore, 10);
                    }
                } catch (e) {
                    console.warn('无法读取最高分:', e);
                    this.highScore = 0;
                }
                this.updateHighScoreDisplay();
            }

            saveHighScore(score) {
                if (score > this.highScore) {
                    this.highScore = score;
                    try {
                        localStorage.setItem('redFortressHighScore', score.toString());
                    } catch (e) {
                        console.warn('无法保存最高分:', e);
                    }
                    this.updateHighScoreDisplay();
                }
            }

            updateHighScoreDisplay() {
                if (this.highScoreElement) {
                    this.highScoreElement.textContent = this.highScore;
                }
            }

            // 对象池方法
            getBullet(x, y, direction, isEnemy = false) {
                // 先尝试从对象池获取
                if (this.objectPools.bullets.length > 0) {
                    const bullet = this.objectPools.bullets.pop();
                    bullet.x = x - 4;
                    bullet.y = y - 4;
                    bullet.direction = direction;
                    bullet.isEnemy = isEnemy;
                    bullet.active = true;
                    bullet.lifeTimer = 0;
                    bullet.setVelocityByDirection();
                    return bullet;
                }
                // 对象池为空，创建新对象
                return new Bullet(x, y, direction, isEnemy);
            }

            recycleBullet(bullet) {
                if (this.objectPools.bullets.length < this.maxPoolSize.bullets) {
                    bullet.active = false;
                    this.objectPools.bullets.push(bullet);
                }
            }

            getParticle(x, y, color, lifetime = 1, speed = 100) {
                // 先尝试从对象池获取
                if (this.objectPools.particles.length > 0) {
                    const particle = this.objectPools.particles.pop();
                    particle.x = x - 2;
                    particle.y = y - 2;
                    particle.color = color;
                    particle.lifetime = lifetime;
                    particle.lifeTimer = 0;
                    particle.alpha = 1;
                    particle.active = true;

                    // 重新设置随机速度
                    const angle = Math.random() * Math.PI * 2;
                    const velocity = speed * (0.5 + Math.random() * 0.5);
                    particle.velocityX = Math.cos(angle) * velocity;
                    particle.velocityY = Math.sin(angle) * velocity;
                    particle.gravity = 50;

                    return particle;
                }
                // 对象池为空，创建新对象
                return new Particle(x, y, color, lifetime, speed);
            }

            recycleParticle(particle) {
                if (this.objectPools.particles.length < this.maxPoolSize.particles) {
                    particle.active = false;
                    this.objectPools.particles.push(particle);
                }
            }

            playSound(soundName) {
                if (!this.audioInitialized || !this.sounds[soundName]) return;

                try {
                    const source = this.audioContext.createBufferSource();
                    const gainNode = this.audioContext.createGain();

                    source.buffer = this.sounds[soundName];
                    source.connect(gainNode);
                    gainNode.connect(this.audioContext.destination);

                    // 设置音量
                    gainNode.gain.value = 0.3; // 全局音量控制

                    source.start(0);
                } catch (e) {
                    console.warn('播放音效失败:', e);
                }
            }

            nextLevel() {
                if (this.level < 3) { // 3个关卡
                    this.loadLevel(this.level + 1);
                } else {
                    this.victory();
                }
            }

            levelComplete() {
                // 关卡完成，短暂延迟后进入下一关
                setTimeout(() => {
                    this.nextLevel();
                }, 2000);
            }

            hideAllMenus() {
                this.mainMenu.classList.add('hidden');
                this.pauseMenu.classList.add('hidden');
                this.gameOverMenu.classList.add('hidden');
                this.victoryMenu.classList.add('hidden');
            }

            startGameLoop() {
                this.lastTime = performance.now();
                this.gameLoop();
            }

            cancelGameLoop() {
                if (this.animationFrameId) {
                    cancelAnimationFrame(this.animationFrameId);
                    this.animationFrameId = null;
                }
            }

            gameLoop(currentTime = 0) {
                this.animationFrameId = requestAnimationFrame((time) => this.gameLoop(time));

                const frameTime = (currentTime - this.lastTime) / 1000;
                this.lastTime = currentTime;

                // 防止帧率过低导致逻辑错误
                if (frameTime > 0.25) {
                    this.accumulator += 0.25;
                } else {
                    this.accumulator += frameTime;
                }

                // 固定时间步长更新逻辑
                while (this.accumulator >= this.fixedTimeStep) {
                    this.update(this.fixedTimeStep);
                    this.accumulator -= this.fixedTimeStep;
                }

                // 渲染
                this.render();
            }

            update(deltaTime) {
                if (this.state !== GameState.PLAYING) return;

                // 更新所有实体
                for (let i = this.entities.length - 1; i >= 0; i--) {
                    const entity = this.entities[i];
                    if (entity.active) {
                        if (entity instanceof Player) {
                            entity.update(deltaTime, this.input, this);
                        } else if (entity instanceof Enemy) {
                            entity.update(deltaTime, this);
                        } else if (entity instanceof Hostage) {
                            entity.update(deltaTime, this);
                        } else if (entity instanceof Grenade) {
                            entity.update(deltaTime, this);
                        } else if (entity instanceof PowerUp) {
                            entity.update(deltaTime, this);
                        } else if (entity instanceof Bullet) {
                            entity.update(deltaTime, this);
                        } else if (entity instanceof Particle) {
                            entity.update(deltaTime, this);
                        } else {
                            entity.update(deltaTime);
                        }
                    } else {
                        this.entities.splice(i, 1);
                    }
                }

                // 限制最大实体数量，防止卡顿
                if (this.entities.length > this.maxEntities) {
                    // 优先移除粒子效果
                    const particles = this.entities.filter(e => e instanceof Particle);
                    if (particles.length > 0) {
                        for (let i = 0; i < Math.min(particles.length, this.entities.length - this.maxEntities); i++) {
                            particles[i].active = false;
                        }
                    }
                }

                // 碰撞检测
                this.checkCollisions();

                // 检查玩家生命
                if (this.player.lives <= 0) {
                    this.gameOver();
                }

                // 检查关卡完成条件 - 摧毁敌人基地或解救人质
            }

            checkCollisions() {
                const entities = this.entities;
                const gridSize = 64; // 空间分区网格大小
                const grid = {};

                // 将实体分配到网格中
                for (const entity of entities) {
                    if (!entity.active) continue;

                    // 计算实体所在的网格单元格
                    const gridX = Math.floor(entity.x / gridSize);
                    const gridY = Math.floor(entity.y / gridSize);
                    const key = `${gridX},${gridY}`;

                    if (!grid[key]) grid[key] = [];
                    grid[key].push(entity);
                }

                // 子弹碰撞检测
                const bullets = entities.filter(e => e instanceof Bullet && e.active);
                const enemies = entities.filter(e => e instanceof Enemy && e.active);
                const buildings = entities.filter(e => e instanceof Building && e.active && !e.destroyed);
                const obstacles = entities.filter(e => e instanceof Obstacle && e.active && !e.destroyed);
                const hostages = entities.filter(e => e instanceof Hostage && e.active && !e.rescued);
                const player = this.player;

                bullets.forEach(bullet => {
                    // 只检查子弹所在网格和相邻网格的实体
                    const gridX = Math.floor(bullet.x / gridSize);
                    const gridY = Math.floor(bullet.y / gridSize);
                    const nearbyEntities = [];

                    // 检查当前网格和8个相邻网格
                    for (let dx = -1; dx <= 1; dx++) {
                        for (let dy = -1; dy <= 1; dy++) {
                            const key = `${gridX + dx},${gridY + dy}`;
                            if (grid[key]) {
                                nearbyEntities.push(...grid[key]);
                            }
                        }
                    }

                    // 敌人子弹击中玩家
                    if (bullet.isEnemy && player.active && !player.invulnerable) {
                        if (bullet.checkCollision(player)) {
                            bullet.hit(this);
                            this.playSound('hit');
                            if (player.takeDamage()) {
                                this.gameOver();
                            }
                            this.updateUI();
                            return;
                        }
                    }

                    // 玩家子弹击中敌人
                    if (!bullet.isEnemy) {
                        for (const enemy of enemies) {
                            if (nearbyEntities.includes(enemy) && bullet.checkCollision(enemy)) {
                                bullet.hit(this);
                                enemy.takeDamage(bullet.damage, this);
                                return;
                            }
                        }
                    }

                    // 子弹击中建筑
                    for (const building of buildings) {
                        if (nearbyEntities.includes(building) && bullet.checkCollision(building)) {
                            bullet.hit(this);
                            building.takeDamage(bullet.damage, this);
                            return;
                        }
                    }

                    // 子弹击中障碍物
                    for (const obstacle of obstacles) {
                        if (nearbyEntities.includes(obstacle) && bullet.checkCollision(obstacle)) {
                            bullet.hit(this);
                            obstacle.takeDamage(bullet.damage, this);
                            return;
                        }
                    }

                    // 子弹击中人质（误杀）
                    if (!bullet.isEnemy) {
                        for (const hostage of hostages) {
                            if (nearbyEntities.includes(hostage) && bullet.checkCollision(hostage)) {
                                bullet.hit(this);
                                hostage.takeDamage(bullet.damage, this);
                                return;
                            }
                        }
                    }
                });

                // 玩家与敌人碰撞
                enemies.forEach(enemy => {
                    if (player.active && !player.invulnerable && player.checkCollision(enemy)) {
                        this.playSound('hit');
                        if (player.takeDamage()) {
                            this.gameOver();
                        }
                        this.updateUI();
                    }
                });

                // 玩家与障碍物碰撞
                obstacles.forEach(obstacle => {
                    if (player.checkCollision(obstacle)) {
                        this.resolveCollision(player, obstacle);
                    }
                });

                // 玩家与建筑碰撞
                buildings.forEach(building => {
                    if (!building.destroyed && player.checkCollision(building)) {
                        this.resolveCollision(player, building);
                    }
                });

                // 敌人与障碍物碰撞
                enemies.forEach(enemy => {
                    obstacles.forEach(obstacle => {
                        if (enemy.checkCollision(obstacle)) {
                            this.resolveCollision(enemy, obstacle);
                        }
                    });

                    buildings.forEach(building => {
                        if (!building.destroyed && enemy.checkCollision(building)) {
                            this.resolveCollision(enemy, building);
                        }
                    });
                });

                // 手雷与障碍物碰撞（简单处理，直接爆炸）
                const grenades = entities.filter(e => e instanceof Grenade && e.active && !e.exploded);
                grenades.forEach(grenade => {
                    obstacles.forEach(obstacle => {
                        if (grenade.checkCollision(obstacle) && obstacle.type === Obstacle.TYPE_ROCK) {
                            // 碰到岩石直接爆炸
                            grenade.explode(this);
                        }
                    });

                    buildings.forEach(building => {
                        if (!building.destroyed && grenade.checkCollision(building)) {
                            // 碰到建筑直接爆炸
                            grenade.explode(this);
                        }
                    });
                });

                // 人质与障碍物碰撞
                hostages.forEach(hostage => {
                    obstacles.forEach(obstacle => {
                        if (hostage.checkCollision(obstacle)) {
                            this.resolveCollision(hostage, obstacle);
                        }
                    });

                    buildings.forEach(building => {
                        if (!building.destroyed && hostage.checkCollision(building)) {
                            this.resolveCollision(hostage, building);
                        }
                    });
                });
            }

            resolveCollision(entity, obstacle) {
                // 简单的碰撞分辨率：将实体推回不重叠的位置
                const entityBounds = entity.getBounds();
                const obstacleBounds = obstacle.getBounds();

                const overlapX = Math.min(
                    entityBounds.x + entityBounds.width - obstacleBounds.x,
                    obstacleBounds.x + obstacleBounds.width - entityBounds.x
                );
                const overlapY = Math.min(
                    entityBounds.y + entityBounds.height - obstacleBounds.y,
                    obstacleBounds.y + obstacleBounds.height - entityBounds.y
                );

                if (overlapX < overlapY) {
                    // X轴碰撞
                    if (entityBounds.x < obstacleBounds.x) {
                        entity.x = obstacleBounds.x - entityBounds.width;
                    } else {
                        entity.x = obstacleBounds.x + obstacleBounds.width;
                    }
                    entity.velocityX = 0;
                } else {
                    // Y轴碰撞
                    if (entityBounds.y < obstacleBounds.y) {
                        entity.y = obstacleBounds.y - entityBounds.height;
                    } else {
                        entity.y = obstacleBounds.y + obstacleBounds.height;
                    }
                    entity.velocityY = 0;
                }
            }

            render() {
                // 清空画布，使用关卡对应的背景色
                this.ctx.fillStyle = this.levelBackgroundColor || '#111122';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // 渲染所有实体
                this.entities.forEach(entity => {
                    if (entity.active) {
                        entity.render(this.ctx);
                    }
                });
            }

            updateUI() {
                this.livesElement.textContent = this.player.lives;
                this.hostagesElement.textContent = `${this.player.hostagesRescued}/${this.player.maxHostages}`;
                this.grenadesElement.textContent = this.player.grenades;
                this.scoreElement.textContent = this.player.score;
                this.levelElement.textContent = this.level;
            }
        }

        // 游戏初始化
        const game = new Game();
    </script>
